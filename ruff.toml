# Ruff configuration for electricity-price-forecast
# See https://docs.astral.sh/ruff/configuration/

target-version = "py310"
line-length = 100
src = ["src", "tests", "scripts"]

[lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # Pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
]
ignore = ["E501"]

[lint.isort]
known-first-party = ["electricity_forecast"]

[format]
quote-style = "double"
