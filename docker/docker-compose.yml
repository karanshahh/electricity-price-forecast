version: "3.8"

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
      - ../mlruns:/app/mlruns
    env_file:
      - ../.env
    environment:
      - MLFLOW_TRACKING_URI=./mlruns

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: streamlit run src/electricity_forecast/app/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - ../data:/app/data
      - ../mlruns:/app/mlruns
    env_file:
      - ../.env
